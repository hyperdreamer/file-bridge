# Save requests are constrained to this directory. Relative save paths are
# resolved under this root, and absolute paths must also stay inside it.
save_root: "~"

# Maximum UTF-8 encoded text size in bytes. The default is 1 MiB. Set to 0 to
# disable the decoded-text check.
max_text_bytes: 1048576

# Server port (always binds to 127.0.0.1 only).
port: 8964
